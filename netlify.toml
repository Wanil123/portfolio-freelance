[build]
  command = "npm ci && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# SPA React/Vite : toutes les routes -> index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Forcer HTTPS
[[redirects]]
  from = "http://*"
  to = "https://:splat"
  status = 301
  force = true

# Headers de sécurité pour TOUTES les routes (pas seulement /)
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    Content-Security-Policy = "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'self'; form-action 'self'; script-src 'self' 'sha256-Ebt84R/xi8miDnxS/0/bkTjVgDRKQpWS1eI09TLbNkg=' https://assets.calendly.com https://plausible.io https://www.googletagmanager.com https://www.googleadservices.com https://connect.facebook.net; style-src 'self' 'unsafe-inline' https://assets.calendly.com; img-src 'self' https: data: https://assets.calendly.com; font-src 'self' https: data:; frame-src https://calendly.com https://assets.calendly.com https://td.doubleclick.net; connect-src 'self' https://calendly.com https://assets.calendly.com https://plausible.io https://www.google.com https://googleads.g.doubleclick.net https://www.googleadservices.com https://region1.google-analytics.com https://www.facebook.com https://connect.facebook.net"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Headers pour assets statiques (cache long)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Vite-built JS/CSS live under /assets/ with content hashes → safe to cache 1 yr
# (already covered by the /assets/* rule above). Hand-written files served
# outside /assets/ (/ia/ia.js, /blog/blog.css) must NOT be cached immutably,
# or edits never reach returning visitors.
[[headers]]
  for = "/ia/ia.js"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

[[headers]]
  for = "/web/web.js"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

[[headers]]
  for = "/blog/blog.css"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

# Headers pour images (cache long)
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Headers pour fonts
[[headers]]
  for = "/*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.woff"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
